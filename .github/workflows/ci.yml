name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Clone codetracer-trace-format (Cargo path dependency)
        run: |
          PINS=".github/sibling-pins"
          TF_REF="main"
          if [ -f "${PINS}" ]; then
            PIN="$(grep '^codetracer-trace-format ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN}" ] && TF_REF="${PIN}"
          fi
          TOKEN="${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}"
          if [ -n "${TOKEN}" ]; then
            CLONE_URL="https://x-access-token:${TOKEN}@github.com/metacraft-labs/codetracer-trace-format.git"
          else
            CLONE_URL="https://github.com/metacraft-labs/codetracer-trace-format.git"
          fi
          rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
          if ! git clone --depth 1 --branch "${TF_REF}" --single-branch \
            "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format" 2>/dev/null; then
            rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format"
            git clone --no-checkout "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format"
            git -C "${GITHUB_WORKSPACE}/../codetracer-trace-format" checkout "${TF_REF}"
          fi

      - name: Build Nim trace writer library
        run: |
          PINS=".github/sibling-pins"
          TFN_REF="main"
          if [ -f "${PINS}" ]; then
            PIN="$(grep '^codetracer-trace-format-nim ' "${PINS}" | cut -d' ' -f2)" || true
            [ -n "${PIN}" ] && TFN_REF="${PIN}"
          fi
          TOKEN="${{ secrets.GH_READ_METACRAFT_PRIVATE_REPOS }}"
          if [ -n "${TOKEN}" ]; then
            CLONE_URL="https://x-access-token:${TOKEN}@github.com/metacraft-labs/codetracer-trace-format-nim.git"
          else
            CLONE_URL="https://github.com/metacraft-labs/codetracer-trace-format-nim.git"
          fi
          rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
          if ! git clone --depth 1 --branch "${TFN_REF}" --single-branch \
            "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim" 2>/dev/null; then
            rm -rf "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
            git clone --no-checkout "${CLONE_URL}" "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim"
            git -C "${GITHUB_WORKSPACE}/../codetracer-trace-format-nim" checkout "${TFN_REF}"
          fi
          nix develop --command bash -c "
            cd '${GITHUB_WORKSPACE}/../codetracer-trace-format-nim'
            nimble install -y stew results
            nim c --app:staticlib --mm:arc --noMain -d:release --passC:'-fPIC' -p:src \
              -o:libcodetracer_trace_writer.a src/codetracer_trace_writer_ffi.nim
          "
          echo "CODETRACER_NIM_LIB_DIR=${GITHUB_WORKSPACE}/../codetracer-trace-format-nim" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: nix develop --command npm install

      - name: Build native addon
        run: |
          nix develop --command bash -c "CODETRACER_NIM_LIB_DIR='${{ github.workspace }}/../codetracer-trace-format-nim' just build-native"

      - name: Build TypeScript packages
        run: nix develop --command npm run build

      - name: Run tests
        run: nix develop --command just test

  nix-build:
    name: Verify nix flake packages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build default package
        run: nix build .#default
