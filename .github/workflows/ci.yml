name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Cache Nix store
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Install dependencies
        run: nix develop --command npm install

      - name: Build native addon
        run: nix develop --command just build-native

      - name: Build TypeScript packages
        run: nix develop --command npm run build

      - name: Run tests
        run: nix develop --command just test

  windows-build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx napi build --release --manifest-path crates/recorder_native/Cargo.toml --output-dir crates/recorder_native/

      - name: Build TypeScript packages
        run: npm run build

      - name: Run tests
        run: npm test

  nix-build:
    name: Verify nix flake packages build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build default package
        run: nix build .#default
